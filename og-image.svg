<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0E17"/>
      <stop offset="1" stop-color="#0E1422"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.6">
      <stop offset="0" stop-color="#FF8A1E" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FF8A1E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rail" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#FF8A1E" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#FF8A1E" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- faint converging rails motif -->
  <g opacity="0.5">
    <path d="M120 700 L560 250" stroke="url(#rail)" stroke-width="2"/>
    <path d="M1080 700 L640 250" stroke="url(#rail)" stroke-width="2"/>
    <g stroke="#23406a" stroke-width="1.2" opacity="0.5">
      <line x1="240" y1="600" x2="960" y2="600"/>
      <line x1="330" y1="500" x2="870" y2="500"/>
      <line x1="400" y1="420" x2="800" y2="420"/>
    </g>
  </g>

  <!-- logo mark + wordmark -->
  <g transform="translate(80,74)">
    <g transform="scale(2.35)">
      <rect width="34" height="34" rx="8" fill="#0F2A4A"/>
      <path d="M7 27 L15 7" stroke="#FF8A1E" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M27 27 L19 7" stroke="#FF8A1E" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="9.5" y1="21" x2="24.5" y2="21" stroke="#E7ECF3" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
      <line x1="11.5" y1="15" x2="22.5" y2="15" stroke="#E7ECF3" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
      <line x1="13" y1="10" x2="21" y2="10" stroke="#E7ECF3" stroke-width="1.6" stroke-linecap="round" opacity="0.5"/>
    </g>
    <text x="100" y="56" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="40" letter-spacing="1" fill="#FFFFFF">RAILS</text>
    <rect x="228" y="26" width="66" height="34" rx="7" fill="#FF8A1E"/>
    <text x="261" y="52" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="22" letter-spacing="1" fill="#0A0E17" text-anchor="middle">GTM</text>
  </g>

  <!-- eyebrow -->
  <text x="82" y="300" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="22" letter-spacing="3" fill="#FF8A1E">END-TO-END GO-TO-MARKET · ADVISORY + IMPLEMENTATION</text>

  <!-- headline -->
  <text x="78" y="378" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="68" fill="#FFFFFF">The GTM partner who finds</text>
  <text x="78" y="456" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="68" fill="#FFFFFF">what you're <tspan fill="#FF8A1E">missing</tspan>.</text>

  <!-- footer domain -->
  <rect x="82" y="524" width="46" height="4" rx="2" fill="#FF8A1E"/>
  <text x="82" y="566" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="26" fill="#9AA7BC">railsgtm.com</text>
</svg>
